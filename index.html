<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savio Sena</title>
    <link rel="stylesheet" href="style.css">
    <!--FONTS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <!-------------------------HEADER----------------------------->
    <header>
        <img src="./img/point.png" alt="points icon">
        <h1><span class="highlight">Savio</span> Sena</h1>
    </header>

    <main>

        <section class="analysis">
            <div class="title-container">
                <h2>📊 <span class="highlight">Análise</span></h2>
                <div class="line"></div>
            </div>

            <div class="summary-games-container">
                <h3 id="title-sumary">RESUMO - ÚLTIMOS 10 JOGOS</h3>

                <div class="items-container">
                    <div class="summary-games-container item">
                        <p>Concursos</p>
                        <p class="item-number" id="item-number">10</p>
                    </div>

                    <div class="summary-games-container item">
                        <p>Análise</p>
                        <p class="item-number">100%</p>
                    </div>
                </div>
            </div>

            <div class="main-numbers-container">
                <h3>NÚMEROS COM ALTA OCORRÊNCIA</h3>

                <div class="main-numbers">
                    <div class="main-number-container">
                        <p class="main-number">12</p>
                        <p class="repetitions">4x</p>
                    </div>

                    <div class="main-number-container">
                        <p class="main-number">23</p>
                        <p class="repetitions">4x</p>
                    </div>

                    <div class="main-number-container">
                        <p class="main-number">23</p>
                        <p class="repetitions">4x</p>
                    </div>

                    <div class="main-number-container">
                        <p class="main-number">23</p>
                        <p class="repetitions">4x</p>
                    </div>

                    <div class="main-number-container">
                        <p class="main-number">23</p>
                        <p class="repetitions">4x</p>
                    </div>

                    <div class="main-number-container">
                        <p class="main-number">23</p>
                        <p class="repetitions">4x</p>
                    </div>
                </div>
            </div>

            <div class="contests-container">
                <h3>ÚLTIMOS SORTEIOS</h3>

                <div class="contests" id="contests">
                </div>
            </div>
        </section>

        <section class="generate-game">
            <div class="title-container">
                <h2>📊 <span class="highlight">Gerar jogos</span></h2>
                <div class="line"></div>
            </div>

            <div class="game-quantity-container">
                <h3>QUANTIDADE DE JOGOS</h3>
                <div class="input-game-quantity-container">
                    <button>-</button>
                    <p>5</p>
                    <button>+</button>
                </div>
            </div>

            
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
